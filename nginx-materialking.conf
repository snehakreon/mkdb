# ============================================================
# MaterialKing - Nginx Configuration for CentOS VPS
# Save as: /etc/nginx/conf.d/materialking.conf
# ============================================================

# Main storefront — materialking.in
server {
    listen 80;
    server_name materialking.in www.materialking.in;

    root /var/www/materialking/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # API proxy → backend on port 5000
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Uploaded files
    location /uploads/ {
        alias /var/www/materialking/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Admin panel — admin.materialking.in
server {
    listen 80;
    server_name admin.materialking.in;

    root /var/www/materialking/material-king-admin/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Uploaded files
    location /uploads/ {
        alias /var/www/materialking/backend/uploads/;
        expires 30d;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
